name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (workerd + D1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to Cloudflare
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          cache: npm
      - run: npm ci
      # Apply any new D1 migrations to the production database, then deploy.
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply cleantech_index --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Push secrets from GitHub into Cloudflare's encrypted secret store.
      # Add a new line here whenever you add a new secret.
      - name: Sync secrets to Cloudflare
        run: |
          echo "${{ secrets.SIGNING_SECRET }}"      | npx wrangler secret put SIGNING_SECRET
          echo "${{ secrets.RESEND_API_KEY }}"      | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.STRIPE_SECRET_KEY }}"   | npx wrangler secret put STRIPE_SECRET_KEY      || true
          echo "${{ secrets.STRIPE_WEBHOOK_SECRET }}" | npx wrangler secret put STRIPE_WEBHOOK_SECRET || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
